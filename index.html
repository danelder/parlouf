<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Relay Race Timer">
    <meta name="theme-color" content="#4CAF50">
    <title>Paarlauf Relay Race Timer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Paarlauf Relay Race Timer</h1>
        
        <!-- Runner Name Entry -->
        <div class="runner-names-section">
            <h2>Enter Runner Names</h2>
            <div id="runner-names-container">
                <!-- Will be populated by JavaScript -->
            </div>
            <button id="save-names-btn">Save Names</button>
        </div>

        <!-- Timer Display -->
        <div class="timer-display">
            <div id="main-timer">00:00:00.00</div>
            <div id="current-leg">Runner: 1 | Leg: 1</div>
            <div id="total-race-time">Race Time: 00:00:00.00</div>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button id="next-leg-btn">Next Leg</button>
            <button id="reset-btn">Reset Race</button>
            <button id="oops-btn">Oops</button>
        </div>

        <!-- Runner Timers -->
        <div class="runners-container">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <script src="app.js"></script>
    <script src="sw.js"></script>
</body>
</html>
